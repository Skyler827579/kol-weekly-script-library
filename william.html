<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>William 每周技术脚本库</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-kol="william">
  <main class="shell">
    <header class="library-header william">
      <nav class="crumb"><a href='/'>总目录</a><span>/</span><strong>William</strong></nav>
      <div class="header-grid">
        <div>
          <p class="eyebrow">William · will_TT · 5LWMU</p>
          <h1>William 每周技术讲解脚本库</h1>
          <p class="lead">定位：ICT/SMC 用户教育 + 群内交易纪律。每周保留 3 篇基础教学稿件，并每天更新近期行情解读；历史稿件会保留。价格、RSI、MACD、ATR 会在打开页面和点击刷新时重新读取，并同步写入口播稿。</p>
        </div>
        <aside class="profile-box">
          <span>群特征</span>
          <strong>技术问题多，跟随意愿强</strong>
          <p>适合用“先判断方向，再等确认，再控制仓位”的结构反复训练用户。</p>
        </aside>
      </div>
    </header>

    <section id="directory" class="panel">
      <div class="section-title">
        <div>
          <p class="eyebrow">Daily</p>
          <h2>本周脚本目录</h2>
        </div>
        <button class="ghost-btn" data-refresh>刷新行情</button>
      </div>
      <div class="usage-note">录制前先点“刷新行情”。刷新后，价格、RSI、MACD、ATR 会重新读取，并同步更新脚本详情和英文口播稿。</div>
      <div id="market-strip" class="market-strip"></div>
      <div id="script-list" class="script-list"></div>
    </section>

    <section id="detail" class="panel detail-panel" hidden>
      <div class="detail-actions">
        <button class="ghost-btn" data-back>返回目录</button>
        <button class="ghost-btn" data-refresh>刷新行情</button>
      </div>
      <article id="script-detail"></article>
    </section>
  </main>
  <script src="./scripts.js"></script>
</body>
</html>
